<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>כתיבת אותיות – שיטת הרמזור 🚦</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--green:#27c93f;--yellow:#febc2e;--red:#ff5f57;--black:#222;--bg:#0d1b2a;--card:#1a2840;}
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;outline:none;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Rubik',sans-serif;color:#fff;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(2px 2px at 10% 15%,rgba(255,255,255,.7) 0,transparent 0),
  radial-gradient(1px 1px at 25% 70%,rgba(255,255,255,.5) 0,transparent 0),
  radial-gradient(2px 2px at 42% 10%,rgba(255,255,255,.8) 0,transparent 0),
  radial-gradient(1px 1px at 60% 50%,rgba(255,255,255,.6) 0,transparent 0),
  radial-gradient(1px 1px at 88% 25%,rgba(255,255,255,.5) 0,transparent 0),
  radial-gradient(1px 1px at 93% 65%,rgba(255,255,255,.8) 0,transparent 0);}

.screen{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;transition:opacity .3s,transform .3s;}
.screen.out{opacity:0;pointer-events:none;transform:scale(.97);}

/* HOME */
#home{
  padding:0;gap:0;
  display:grid;
  grid-template-rows:auto auto auto 1fr;
  align-items:start;
  justify-items:center;
  padding:clamp(16px,3vh,32px) clamp(16px,4vw,48px);
  gap:clamp(8px,2vh,18px);
  box-sizing:border-box;
}
.logo{
  font-family:'Fredoka One',cursive;
  font-size:clamp(2rem,5vw,3.5rem);
  text-align:center;
  background:linear-gradient(135deg,#27c93f,#febc2e,#ff5f57);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 12px rgba(255,210,0,.35));
  line-height:1.1;
}
.sub{font-size:clamp(.8rem,1.6vw,1.05rem);color:#7aa8d8;text-align:center;}
.top-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;}
.score-pill{
  background:linear-gradient(135deg,#ffd700,#ff8c00);color:#111;
  padding:6px 22px;border-radius:40px;font-weight:900;
  font-size:clamp(.9rem,2vw,1.1rem);
  display:flex;align-items:center;gap:6px;
  box-shadow:0 3px 14px rgba(255,200,0,.35);
}
.prog{font-size:clamp(.8rem,1.5vw,1rem);color:#7aa8d8;}
.grid-wrap{
  width:100%;max-width:min(900px, 100%);
  overflow-y:auto;padding:4px 2px;
  align-self:stretch;
}
.lgrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(clamp(72px,10vw,110px),1fr));
  gap:clamp(6px,1.2vw,14px);
}
.lbtn{
  aspect-ratio:1;border-radius:16px;border:2px solid rgba(255,255,255,.08);
  cursor:pointer;background:var(--card);color:#fff;
  font-size:clamp(1.8rem,4vw,3rem);
  font-family:'Rubik',serif;font-weight:700;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:transform .15s,box-shadow .15s;position:relative;
}
.lbtn:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(0,150,255,.22);}
.lbtn.done{background:linear-gradient(135deg,#0c3a1a,#17602a);border-color:#27c93f;}
.lbtn.done::after{content:'⭐';position:absolute;top:3px;left:5px;font-size:.65rem;}
.lbtn small{font-size:clamp(.4rem,.8vw,.6rem);color:rgba(255,255,255,.35);font-weight:400;}

/* PRACTICE */
#practice{gap:6px;padding:8px;justify-content:flex-start;padding-top:10px;overflow:hidden;}
.ptop{display:flex;align-items:center;gap:8px;width:100%;max-width:100%;}
.back{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);
  border-radius:10px;color:#fff;font-size:1.2rem;padding:6px 11px;
  cursor:pointer;transition:background .2s;white-space:nowrap;font-family:'Rubik',sans-serif;}
.back:hover{background:rgba(255,255,255,.16);}
.ptitle{font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,3.5vw,1.7rem);
  text-align:center;flex:1;}
.hearts{display:flex;gap:4px;}
.heart{font-size:1.2rem;transition:opacity .3s,transform .3s;}
.heart.lost{opacity:.14;transform:scale(.7);}

/* STROKE INDICATOR */
.stroke-bar{display:flex;gap:6px;align-items:center;}
.stroke-pip{width:28px;height:10px;border-radius:20px;background:rgba(255,255,255,.1);
  transition:background .3s,transform .25s,box-shadow .25s;}
.stroke-pip.active{transform:scaleY(1.6);box-shadow:0 0 8px currentColor;}
.stroke-pip.done-pip{opacity:.4;}

/* CANVAS */
.cwrap{position:relative;border-radius:16px;overflow:hidden;
  box-shadow:0 6px 32px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.06);
  cursor:crosshair;user-select:none;}
canvas{display:block;}
#drawC{position:absolute;top:0;left:0;}

/* BOTTOM */
.brow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.legend{display:flex;gap:10px;font-size:.78rem;color:#aac;}
.leg{display:flex;align-items:center;gap:4px;}
.ldot{width:11px;height:11px;border-radius:50%;}
.hbtn{background:rgba(255,215,0,.1);border:1.5px solid rgba(255,215,0,.3);
  border-radius:18px;color:#febc2e;font-size:.82rem;padding:5px 14px;
  cursor:pointer;transition:all .2s;font-family:'Rubik',sans-serif;}
.hbtn:hover{background:rgba(255,215,0,.2);}
.msg{font-size:clamp(.9rem,2.3vw,1.15rem);font-weight:700;text-align:center;
  min-height:1.6em;padding:0 12px;transition:color .25s;}
.msg.ok{color:#27c93f;}.msg.err{color:#ff7070;}.msg.hint{color:#febc2e;}

/* SUCCESS */
.sover{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:13px;
  background:rgba(5,10,20,.92);opacity:0;pointer-events:none;transition:opacity .35s;}
.sover.show{opacity:1;pointer-events:all;}
.sc{font-size:clamp(5.5rem,22vw,10rem);font-family:'Rubik',serif;font-weight:900;
  animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;
  text-shadow:0 0 40px rgba(255,215,0,.9),0 0 80px rgba(255,215,0,.4);}
.sstars{font-size:2.5rem;animation:pop .45s .1s cubic-bezier(.34,1.56,.64,1) both;}
.smsg{font-family:'Fredoka One',cursive;font-size:clamp(1.3rem,4.5vw,2.5rem);
  background:linear-gradient(135deg,#27c93f,#febc2e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:pop .45s .18s cubic-bezier(.34,1.56,.64,1) both;}
.smsg .emoji{-webkit-text-fill-color:initial;background:none;-webkit-background-clip:unset;background-clip:unset;}
.spts{font-size:1.1rem;color:#ffd700;animation:up .4s .3s both;}
.snext{background:linear-gradient(135deg,#27c93f,#00a06a);border:none;border-radius:18px;
  color:#fff;font-family:'Fredoka One',cursive;font-size:1.3rem;padding:11px 32px;
  cursor:pointer;animation:up .4s .42s both;box-shadow:0 5px 20px rgba(39,201,63,.4);
  transition:transform .15s;}
.snext:hover{transform:scale(1.07);}
#fw{position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;transition:opacity .3s;}
#fw.on{opacity:1;}
@keyframes pop{from{opacity:0;transform:scale(.3) rotate(-12deg)}to{opacity:1;transform:scale(1)}}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.shaking{animation:shake .42s ease-in-out;}

/* ── INK SELECTOR ── */
.ink-bar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
.ink-btn{
  width:32px;height:32px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:transform .15s,border-color .15s;position:relative;
  flex-shrink:0;
}
.ink-btn:hover{transform:scale(1.2);}
.ink-btn.selected{border-color:white;transform:scale(1.25);box-shadow:0 0 10px rgba(255,255,255,.5);}
.ink-btn.glitter{
  background:linear-gradient(135deg,#ff6ec7,#a855f7,#3b82f6,#06b6d4,#10b981,#f59e0b);
  background-size:300% 300%;
  animation:glitter-shift 2s ease infinite;
}
@keyframes glitter-shift{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}

/* ── GALLERY ── */
#gallery{
  padding:clamp(16px,3vh,32px) clamp(16px,4vw,48px);
  gap:clamp(8px,2vh,16px);
  display:grid;
  grid-template-rows:auto 1fr auto;
  align-items:start;
  justify-items:center;
  box-sizing:border-box;
}
.gallery-title{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,4vw,2.2rem);
  text-align:center;
  background:linear-gradient(135deg,#27c93f,#febc2e,#ff5f57);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(clamp(100px,14vw,160px),1fr));
  gap:clamp(8px,1.5vw,16px);
  width:100%;max-width:min(900px,100%);
  overflow-y:auto;padding:4px;
  align-self:stretch;
}
.gcard{
  aspect-ratio:1;border-radius:14px;background:white;
  border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.gcard:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,.4);}
.gcard canvas{max-width:100%;max-height:100%;display:block;}
.gcard .glabel{position:absolute;bottom:3px;right:5px;
  font-size:.65rem;font-weight:700;color:rgba(0,0,0,.35);font-family:'Rubik',sans-serif;}

/* Lightbox */
.lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.lightbox.show{opacity:1;pointer-events:all;}
.lightbox canvas{border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.7);
  max-width:90vw;max-height:75vh;}
.lbclose{background:rgba(255,255,255,.15);border:none;color:white;
  font-size:1.1rem;padding:9px 28px;border-radius:20px;cursor:pointer;
  font-family:'Rubik',sans-serif;}
.gback{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);
  border-radius:10px;color:#fff;font-size:1.1rem;padding:7px 16px;
  cursor:pointer;font-family:'Rubik',sans-serif;}
</style>
</head>
<body>

<div class="screen" id="home">
  <div class="logo">✏️ כתיבת אותיות 🚦</div>
  <div class="sub">עקבו עם אצבע/עט/עכבר — קו אחרי קו!</div>
  <div class="top-row">
    <div class="score-pill">⭐ <span id="tscore">0</span></div>
    <div class="prog" id="progtxt">0 / 0 אותיות</div>
    <button class="gback" onclick="showGallery()" style="font-size:.85rem;padding:5px 12px;">🖼 היצירות</button>
  </div>
  <div class="grid-wrap"><div class="lgrid" id="lgrid"></div></div>
</div>

<div class="screen out" id="practice">
  <div class="ptop">
    <button class="back" onclick="goHome()">← חזרה</button>
    <div class="ptitle" id="ptitle">א — אָלֶף</div>
    <div class="hearts" id="hearts">
      <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
    </div>
  </div>

  <div class="cwrap" id="cwrap">
    <canvas id="bgC"></canvas>
    <canvas id="drawC"></canvas>
  </div>

  <div class="stroke-bar" id="sbar"></div>
  <div class="ink-bar" id="inkBar"></div>

  <div class="brow">
    <div class="legend">
      <div class="leg"><div class="ldot" style="background:#27c93f"></div>התחלה</div>
      <div class="leg"><div class="ldot" style="background:#febc2e"></div>ביניים</div>
      <div class="leg"><div class="ldot" style="background:#ff5f57"></div>סוף קו</div>
      <div class="leg"><div class="ldot" style="background:#555;border:2px solid #999"></div>סוף קו</div>
    </div>
    <button class="hbtn" onclick="showHint()">💡 הראו לי</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<div class="sover" id="sover">
  <div class="sc"    id="sc">א</div>
  <div class="sstars" id="sstars">⭐⭐⭐</div>
  <div class="smsg"  id="smsg">מושלם!</div>
  <div class="spts"  id="spts">+15 נקודות!</div>
  <button class="snext" onclick="nextLetter()">האות הבאה ←</button>
</div>
<canvas id="fw"></canvas>

// ═══════════════ CANVAS SETUP ═══════════════
function calcSZ(letter){
  // Use as much screen as possible
  const pad = window.innerWidth < 500 ? 16 : 24;
  const headerH = 90;   // ptop row
  const footerH = window.innerWidth < 500 ? 110 : 100; // pips+brow+msg
  const maxW = window.innerWidth - pad;
  const maxH = window.innerHeight - headerH - footerH;
  const asp = letter.imgH / letter.imgW;
  let w = maxW, h = Math.round(w * asp);
  if(h > maxH){ h = maxH; w = Math.round(h / asp); }
  return {w, h};
}
const bgC=document.getElementById('bgC'), drawC=document.getElementById('drawC');
const bgX=bgC.getContext('2d'), drX=drawC.getContext('2d');
const fwC=document.getElementById('fw'), fwX=fwC.getContext('2d');
fwC.width=window.innerWidth; fwC.height=window.innerHeight;

const imgCache={};
function loadImg(idx){
  return new Promise(res=>{
    if(imgCache[idx]){res(imgCache[idx]);return;}
    const img=new Image();
    img.onload=()=>{imgCache[idx]=img;res(img);};
    img.onerror=()=>res(null);
    img.src='data:image/png;base64,'+LETTERS[idx].image;
  });
}

function initHome(){
  document.getElementById('tscore').textContent=score;
  const done=Object.keys(stars).length;
  document.getElementById('progtxt').textContent=`${done} / ${LETTERS.length} אותיות`;
  const g=document.getElementById('lgrid'); g.innerHTML='';
  LETTERS.forEach((l,i)=>{
    const b=document.createElement('button');
    b.className='lbtn'+(stars[l.char]?' done':'');
    b.innerHTML=`${l.char}<small>${l.name}</small>`;
    b.onclick=()=>startPractice(i);
    g.appendChild(b);
  });
}
function goHome(){stopHint();showScreen('home');initHome();}

// ═══════════════ PRACTICE ═══════════════
function startPractice(idx){
  cur=idx; attempts=3; curStroke=0; cpNext=0; drawing=false; strokesDrawn=[];
  const L=LETTERS[idx];
  const{w,h}=calcSZ(L);
  [bgC,drawC].forEach(c=>{c.width=w;c.height=h;});
  document.getElementById('cwrap').style.cssText=`width:${w}px;height:${h}px`;
  document.getElementById('ptitle').textContent=`${L.char}  —  ${L.name}`;
  setMsg(''); updateHearts(); buildStrokeBar(); buildInkBar();
  showScreen('practice');
  drX.clearRect(0,0,w,h);
  drawBg();
  loadImg(idx);
  loadMask(idx);
}

// ═══════════════ BACKGROUND CANVAS ═══════════════
const DOT_COL ={green:'#27c93f',yellow:'#febc2e',red:'#ff5f57',black:'#1a1a1a'};
const DOT_BRD ={green:'#1a9830',yellow:'#b88500',red:'#c03530',black:'#777'};
const DOT_RAD ={green:17,yellow:14,red:17,black:16};
const DOT_ICON={green:'▶',yellow:'●',red:'■',black:'●'};

function drawBg(){
  const L=LETTERS[cur];
  const W=bgC.width, H=bgC.height;
  bgX.clearRect(0,0,W,H);

  // Letter image
  const img=imgCache[cur];
  if(img){bgX.drawImage(img,0,0,W,H);}
  else{
    bgX.fillStyle='#f5f0ea';bgX.fillRect(0,0,W,H);
    bgX.font=`bold ${W*.7}px Rubik`;bgX.textAlign='center';bgX.textBaseline='middle';
    bgX.fillStyle='rgba(0,0,0,.07)';bgX.fillText(L.char,W/2,H/2);
    loadImg(cur).then(()=>{if(imgCache[cur])drawBg();});
  }

  // Draw ALL strokes' dots — dim future strokes, show current active
  L.strokes.forEach((stroke,si)=>{
    const isCurrentStroke=(si===curStroke);
    const isPastStroke=(si<curStroke);

    stroke.forEach((pt,pi)=>{
      const x=pt.x*W, y=pt.y*H;
      const col=DOT_COL[pt.role], brd=DOT_BRD[pt.role], r=DOT_RAD[pt.role];
      const hitInStroke=isCurrentStroke && pi<cpNext;
      const hitAll=isPastStroke;
      const isNextTarget=isCurrentStroke && pi===cpNext;
      const isDimmed=si>curStroke;

      bgX.globalAlpha=isDimmed?0.35:1;

      // Glow for next target
      if(isNextTarget){
        const g=bgX.createRadialGradient(x,y,r,x,y,r+14);
        g.addColorStop(0,col+'66');g.addColorStop(1,col+'00');
        bgX.beginPath();bgX.arc(x,y,r+14,0,Math.PI*2);
        bgX.fillStyle=g;bgX.fill();
      }

      // Circle fill
      bgX.beginPath();bgX.arc(x,y,r,0,Math.PI*2);
      bgX.fillStyle=(hitInStroke||hitAll)?'rgba(70,80,70,.65)':col;
      bgX.fill();
      bgX.strokeStyle=(hitInStroke||hitAll)?'#888':brd;
      bgX.lineWidth=3;bgX.stroke();

      // Icon inside
      bgX.fillStyle='white';
      bgX.font=`bold ${r}px Arial`;
      bgX.textAlign='center';bgX.textBaseline='middle';
      if(hitInStroke||hitAll){bgX.fillText('✓',x,y);}
      else{
        bgX.globalAlpha=(bgX.globalAlpha>0.5)?(isNextTarget?1:.45):.25;
        bgX.fillText(DOT_ICON[pt.role],x,y+1);
      }
      bgX.globalAlpha=1;

      // Stroke number label
      if(L.strokes.length>1){
        bgX.font='700 10px Rubik';
        bgX.fillStyle=isDimmed?'rgba(255,255,255,.2)':(isNextTarget?'rgba(255,255,255,.9)':'rgba(255,255,255,.35)');
        bgX.fillText(`${si+1}`,x,y+r+11);
      }
    });
  });
}


// ═══════════════ STROKE MASK ═══════════════
const maskCanvas = document.createElement('canvas');
const maskCtx = maskCanvas.getContext('2d');
const maskImgCache = {};

function loadMask(idx) {
  return new Promise(res => {
    const char = LETTERS[idx].char;
    if (maskImgCache[char]) { res(maskImgCache[char]); return; }
    const m = MASKS[char];
    if (!m) { res(null); return; }
    const img = new Image();
    img.onload = () => { maskImgCache[char] = img; res(img); };
    img.src = 'data:image/png;base64,' + m.data;
  });
}

function isOnStroke(px, py) {
  const char = LETTERS[cur].char;
  const m = MASKS[char];
  const mimg = maskImgCache[char];
  if (!m || !mimg) return true; // no mask = allow
  const W = bgC.width, H = bgC.height;
  // Scale point to mask coords
  const mx = Math.round(px * m.w / W);
  const my = Math.round(py * m.h / H);
  maskCanvas.width = m.w;
  maskCanvas.height = m.h;
  maskCtx.drawImage(mimg, 0, 0);
  const pixel = maskCtx.getImageData(Math.max(0,Math.min(mx,m.w-1)), Math.max(0,Math.min(my,m.h-1)), 1, 1).data;
  return pixel[0] > 128; // white = on stroke
}

// ═══════════════ DRAW EVENTS ═══════════════
function evPos(e){
  const r=drawC.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}
['mousedown','touchstart'].forEach(ev=>
  drawC.addEventListener(ev,e=>{e.preventDefault();onDown(evPos(e));},{passive:false}));
['mousemove','touchmove'].forEach(ev=>
  drawC.addEventListener(ev,e=>{e.preventDefault();if(drawing)onMove(evPos(e));},{passive:false}));
['mouseup','touchend','mouseleave'].forEach(ev=>
  drawC.addEventListener(ev,e=>{e.preventDefault();if(drawing)onUp();},{passive:false}));

function onDown(pt){
  stopHint();
  drawing=true; lastPt=pt;
  // Do NOT reset cpNext — pen lift is OK, continue from where we were
  // But if this is a fresh start (no progress yet), clear canvas
  if(curStroke===0 && cpNext===0){
    drX.clearRect(0,0,bgC.width,bgC.height);
  } else if(strokesDrawn.length>0){
    // Restore completed strokes ink
    drX.clearRect(0,0,bgC.width,bgC.height);
    drX.putImageData(strokesDrawn[strokesDrawn.length-1],0,0);
  }
  drawBg();
  setMsg('');
}

function onMove(pt){
  if(!drawing)return;
  // Check if point is within the blue stroke mask
  if(!isOnStroke(pt.x, pt.y)){
    onFail();
    return;
  }
  if(curInk.glitter){
    drawGlitterStroke(lastPt, pt);
  } else {
    drX.strokeStyle=curInk.color;drX.lineWidth=8;
    drX.lineCap=drX.lineJoin='round';
    drX.shadowColor=curInk.shadow;drX.shadowBlur=12;
    drX.beginPath();drX.moveTo(lastPt.x,lastPt.y);drX.lineTo(pt.x,pt.y);drX.stroke();
    drX.shadowBlur=0;
  }
  lastPt=pt;

  const L=LETTERS[cur];
  const stroke=L.strokes[curStroke];
  if(!stroke)return;
  const W=bgC.width, H=bgC.height;
  const TOL=Math.min(W,H)*0.12;

  if(cpNext<stroke.length){
    const cp=stroke[cpNext];
    if(Math.hypot(pt.x-cp.x*W,pt.y-cp.y*H)<TOL){
      cpNext++;
      // Snap ink to exact dot center
      const snapX=cp.x*W, snapY=cp.y*H;
      if(!curInk.glitter){
        drX.strokeStyle=curInk.color;drX.lineWidth=8;drX.lineCap='round';
        drX.shadowColor=curInk.shadow;drX.shadowBlur=12;
        drX.beginPath(); drX.moveTo(pt.x,pt.y); drX.lineTo(snapX,snapY); drX.stroke();
        drX.shadowBlur=0;
      } else {
        drawGlitterStroke(pt, {x:snapX,y:snapY});
      }
      lastPt={x:snapX,y:snapY};
      drawBg(cpNext);
      playNote(cp.role);
      pulse(snapX,snapY,cp.role);
      updateStrokeBar();
      if(cpNext===stroke.length) onUp(); // auto-end when all pts hit
    }
  }
}

function onUp(){
  if(!drawing)return;
  drawing=false;
  const L=LETTERS[cur];
  const stroke=L.strokes[curStroke];
  if(!stroke)return;

  if(cpNext>=stroke.length){
    // Stroke complete! Save canvas snapshot
    strokesDrawn.push(drX.getImageData(0,0,bgC.width,bgC.height));
    curStroke++;
    cpNext=0;
    updateStrokeBar();

    if(curStroke>=L.strokes.length){
      onSuccess();
    } else {
      const n=curStroke+1;
      const nextIsBlack = L.strokes[curStroke][0].role === 'black';
      setMsg(nextIsBlack ? `מצוין! 🖊️ עכשיו המשיכו מהנקודה השחורה (קו ${n})` : `מצוין! עכשיו קו ${n} 🖊️`,'ok');
      drawBg();
      setTimeout(()=>setMsg('',''),1200);
    }
  }
  // Pen lift mid-stroke = totally fine, just keep cpNext where it is
  // Only failure is going off the blue stroke (handled in onMove)
}

function pulse(cx,cy,role){
  const c=DOT_COL[role];
  let r=22,a=1;
  (function f(){
    drX.save();drX.beginPath();drX.arc(cx,cy,r,0,Math.PI*2);
    drX.strokeStyle=c;drX.globalAlpha=a;drX.lineWidth=4;drX.stroke();
    drX.restore();r+=4;a-=.1;if(a>0)requestAnimationFrame(f);
  })();
}

// ═══════════════ SUCCESS / FAIL ═══════════════
const MSGS=[['מושלם!','מדהים!','כל הכבוד!'],['יפה מאוד!','ממש טוב!'],['הצלחת!']];
function onSuccess(){
  const e=attempts===3?3:attempts>=2?2:1;
  if(!stars[LETTERS[cur].char]||stars[LETTERS[cur].char]<e)stars[LETTERS[cur].char]=e;
  const pts=[0,5,10,15][e];
  score+=pts;
  const arr=MSGS[3-e]||MSGS[2];
  // Save the drawing
  const combined = document.createElement('canvas');
  combined.width=bgC.width; combined.height=bgC.height;
  const cx2=combined.getContext('2d');
  cx2.drawImage(bgC,0,0); cx2.drawImage(drawC,0,0);
  letterDrawings[LETTERS[cur].char]={dataURL:drawC.toDataURL(), inkId:curInk.id, w:bgC.width, h:bgC.height};
  document.getElementById('sc').textContent=LETTERS[cur].char;
  document.getElementById('sstars').textContent='⭐'.repeat(e)+'☆'.repeat(3-e);
  document.getElementById('smsg').textContent=arr[Math.floor(Math.random()*arr.length)];
  document.getElementById('spts').textContent=`+${pts} ⭐  סה"כ: ${score}`;
  document.getElementById('sover').classList.add('show');
  playSuccess();launchFW();
}
function onFail(){
  attempts=Math.max(0,attempts-1);
  updateHearts();
  if(attempts===0){
    setMsg('הנה כיצד לכתוב... 💡','hint');
    attempts=3;updateHearts();
    setTimeout(showHint,350);return;
  }
  playFail();
  const w=document.getElementById('cwrap');
  w.classList.remove('shaking');void w.offsetWidth;w.classList.add('shaking');
  setMsg(['כמעט! נסו שוב 💪','ממש קרוב! 🌟','עוד ניסיון! 🔥'][Math.floor(Math.random()*3)],'err');
  setTimeout(()=>{
    // Reset to current stroke start (keep completed strokes)
    cpNext=0;
    if(strokesDrawn.length>0){
      drX.clearRect(0,0,bgC.width,bgC.height);
      drX.putImageData(strokesDrawn[strokesDrawn.length-1],0,0);
    } else {
      drX.clearRect(0,0,bgC.width,bgC.height);
    }
    drawBg();updateStrokeBar();setMsg('');
  },800);
}
function nextLetter(){
  document.getElementById('sover').classList.remove('show');
  stopFW();startPractice((cur+1)%LETTERS.length);
}

// ═══════════════ STROKE BAR ═══════════════
function buildStrokeBar(){
  const bar=document.getElementById('sbar');bar.innerHTML='';
  const L=LETTERS[cur];
  if(L.strokes.length<=1){bar.style.display='none';return;}
  bar.style.display='flex';
  L.strokes.forEach((s,i)=>{
    const pip=document.createElement('div');
    pip.className='stroke-pip'+(i===0?' active':'');
    pip.id='spip'+i;
    // Color from first dot in stroke
    const col=DOT_COL[s[0].role];
    pip.style.background=i===0?col:'rgba(255,255,255,.1)';
    pip.style.color=col;
    bar.appendChild(pip);
    if(i<L.strokes.length-1){
      const sep=document.createElement('span');
      sep.textContent='→';sep.style.cssText='font-size:.7rem;color:rgba(255,255,255,.3)';
      bar.appendChild(sep);
    }
  });
}
function updateStrokeBar(){
  const L=LETTERS[cur];
  if(L.strokes.length<=1)return;
  L.strokes.forEach((s,i)=>{
    const pip=document.getElementById('spip'+i);if(!pip)return;
    pip.classList.remove('active','done-pip');
    const col=DOT_COL[s[0].role];
    if(i<curStroke){pip.classList.add('done-pip');pip.style.background=col+'66';}
    else if(i===curStroke){pip.classList.add('active');pip.style.background=col;}
    else{pip.style.background='rgba(255,255,255,.1)';}
  });
}

// ═══════════════ HINT ═══════════════
function showHint(){
  stopHint();
  // Reset state
  curStroke=0;cpNext=0;strokesDrawn=[];
  drX.clearRect(0,0,bgC.width,bgC.height);
  drawBg();buildStrokeBar();
  setMsg('הצטרפו לנקודה ✨','hint');

  const L=LETTERS[cur];
  const W=bgC.width,H=bgC.height;
  let si=0; // stroke index for hint

  function runStroke(strokeIdx){
    if(strokeIdx>=L.strokes.length){
      drX.clearRect(0,0,W,H);
      curStroke=0;cpNext=0;strokesDrawn=[];
      drawBg();buildStrokeBar();
      setMsg('עכשיו התור שלכם! ✏️','hint');
      return;
    }
    const stroke=L.strokes[strokeIdx];
    const WAY=stroke.map(p=>({x:p.x*W,y:p.y*H,role:p.role}));
    const STEPS=80;let step=0;const trail=[];
    let localCp=0;

    function lerp(a,b,t){return a+(b-a)*t;}
    function gp(t){
      const seg=(WAY.length-1)*t;
      const i=Math.min(Math.floor(seg),WAY.length-2);
      return{x:lerp(WAY[i].x,WAY[i+1].x,seg-i),y:lerp(WAY[i].y,WAY[i+1].y,seg-i),
             role:WAY[Math.round(t*(WAY.length-1))]?.role||WAY[0].role};
    }

    function anim(){
      const t=step/STEPS,pt=gp(t);
      trail.push({...pt});if(trail.length>20)trail.shift();

      // Restore completed previous strokes
      if(strokesDrawn.length>0){
        drX.clearRect(0,0,W,H);
        drX.putImageData(strokesDrawn[strokesDrawn.length-1],0,0);
      } else {
        drX.clearRect(0,0,W,H);
      }

      // Trail
      trail.forEach((tp,j)=>{
        const a=(j/trail.length)*.55,r=3+j*.32;
        drX.beginPath();drX.arc(tp.x,tp.y,r,0,Math.PI*2);
        drX.fillStyle=DOT_COL[tp.role]||'#fff';
        drX.globalAlpha=a;drX.fill();drX.globalAlpha=1;
      });

      // Ball
      const col=DOT_COL[pt.role]||'#fff';
      drX.beginPath();drX.arc(pt.x,pt.y,12,0,Math.PI*2);
      drX.fillStyle=col;drX.shadowColor=col;drX.shadowBlur=22;drX.fill();drX.shadowBlur=0;

      // Advance local checkpoint display
      stroke.forEach((cp,i)=>{
        if(i===localCp&&Math.hypot(pt.x-cp.x*W,pt.y-cp.y*H)<W*.1){
          localCp++;curStroke=strokeIdx;cpNext=localCp;drawBg();updateStrokeBar();
        }
      });

      step++;
      if(step<=STEPS){hintTid=setTimeout(()=>{hintAF=requestAnimationFrame(anim);},30);}
      else{
        // Save snapshot of this stroke
        strokesDrawn.push(drX.getImageData(0,0,W,H));
        curStroke=strokeIdx+1;cpNext=0;
        drawBg();updateStrokeBar();
        if(strokeIdx+1<L.strokes.length){
          setMsg(`עכשיו קו ${strokeIdx+2} ✨`,'hint');
          hintTid=setTimeout(()=>runStroke(strokeIdx+1),700);
        } else {
          // All done
          hintTid=setTimeout(()=>{
            drX.clearRect(0,0,W,H);curStroke=0;cpNext=0;strokesDrawn=[];
            drawBg();buildStrokeBar();
            setMsg('עכשיו התור שלכם! ✏️','hint');
          },400);
        }
      }
    }
    anim();
  }
  runStroke(0);
}
function stopHint(){clearTimeout(hintTid);cancelAnimationFrame(hintAF);}

// ═══════════════ FIREWORKS ═══════════════
const parts=[];
class P{
  constructor(x,y){const a=Math.random()*Math.PI*2,s=2+Math.random()*9;
    Object.assign(this,{x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,
      life:1,decay:.013+Math.random()*.025,r:4+Math.random()*4,hue:Math.floor(Math.random()*360)});}
  tick(){this.x+=this.vx;this.y+=this.vy;this.vy+=.18;this.life-=this.decay;this.r*=.97;}
  draw(c){c.save();c.globalAlpha=Math.max(0,this.life);c.fillStyle=`hsl(${this.hue},100%,62%)`;
    c.shadowColor=`hsl(${this.hue},100%,65%)`;c.shadowBlur=8;
    c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);c.fill();c.restore();}
}
let fwA;
function burst(x,y,n=75){for(let i=0;i<n;i++)parts.push(new P(x,y));}
function launchFW(){
  fwC.classList.add('on');const W=fwC.width,H=fwC.height;
  let n=0,iv=setInterval(()=>{burst(W*.1+Math.random()*W*.8,H*.05+Math.random()*H*.5,80);if(++n>5)clearInterval(iv);},290);
  (function loop(){fwX.clearRect(0,0,W,H);
    for(let i=parts.length-1;i>=0;i--){parts[i].tick();parts[i].draw(fwX);if(parts[i].life<=0)parts.splice(i,1);}
    fwA=requestAnimationFrame(loop);})();
}
function stopFW(){cancelAnimationFrame(fwA);fwC.classList.remove('on');parts.length=0;fwX.clearRect(0,0,fwC.width,fwC.height);}

// ═══════════════ AUDIO ═══════════════
let actx;
function ac(){return actx||(actx=new(window.AudioContext||window.webkitAudioContext)());}
function tone(f,d=.13,t='sine',v=.25){
  try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}
}
function playNote(r){tone({green:520,yellow:660,red:800,black:440}[r]||600,.14,'sine',.2);}
function playSuccess(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.26),i*100));}
function playFail(){tone(250,.3,'sawtooth',.14);}

// ═══════════════ UTILS ═══════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('out',s.id!==id));
  if(id==='practice')loadImg(cur).then(()=>drawBg());
}
function setMsg(t,c=''){const e=document.getElementById('msg');e.textContent=t;e.className='msg'+(c?' '+c:'');}
function updateHearts(){document.querySelectorAll('.heart').forEach((h,i)=>h.classList.toggle('lost',i>=attempts));}


// ═══════════════ GLITTER ═══════════════
const GLITTER_COLORS=['#ff6ec7','#a855f7','#3b82f6','#06b6d4','#10b981','#f59e0b','#ef4444','#ffffff'];
function drawGlitterStroke(from, to){
  const dx=to.x-from.x, dy=to.y-from.y;
  const dist=Math.hypot(dx,dy)||1;
  const steps=Math.max(2,Math.floor(dist/4));
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const x=from.x+dx*t, y=from.y+dy*t;
    // Main line dot
    drX.beginPath();
    drX.arc(x,y,3.5,0,Math.PI*2);
    drX.fillStyle=GLITTER_COLORS[Math.floor(Math.random()*GLITTER_COLORS.length)];
    drX.globalAlpha=0.9;
    drX.fill();
    drX.globalAlpha=1;
    // Sparkle particles
    if(Math.random()<0.4){
      const col=GLITTER_COLORS[Math.floor(Math.random()*GLITTER_COLORS.length)];
      const px=x+(Math.random()-0.5)*18, py=y+(Math.random()-0.5)*18;
      const pr=1+Math.random()*2.5;
      drX.beginPath();drX.arc(px,py,pr,0,Math.PI*2);
      drX.fillStyle=col;drX.globalAlpha=0.7;drX.fill();drX.globalAlpha=1;
    }
  }
}

// ═══════════════ INK BAR ═══════════════
function buildInkBar(){
  const bar=document.getElementById('inkBar'); bar.innerHTML='';
  INKS.forEach(ink=>{
    const btn=document.createElement('button');
    btn.className='ink-btn'+(ink.glitter?' glitter':'')+(ink===curInk?' selected':'');
    btn.title=ink.name;
    if(!ink.glitter) btn.style.background=ink.color;
    btn.onclick=()=>{
      curInk=ink;
      document.querySelectorAll('.ink-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    // Star symbol inside
    const star=document.createElement('span');
    star.textContent=ink.glitter?'✨':'';
    star.style.cssText='font-size:.9rem;pointer-events:none;';
    btn.appendChild(star);
    bar.appendChild(btn);
  });
}

// ═══════════════ GALLERY ═══════════════
function showGallery(){
  const grid=document.getElementById('galGrid'); grid.innerHTML='';
  const done=Object.keys(letterDrawings);
  if(done.length===0){
    grid.innerHTML='<div style="color:rgba(255,255,255,.5);text-align:center;padding:40px;grid-column:1/-1;font-size:1rem;">עדיין לא כתבת אותיות!<br><span style="font-size:2rem">✏️</span></div>';
  } else {
    done.forEach(char=>{
      const d=letterDrawings[char];
      const card=document.createElement('div');
      card.className='gcard';
      const c=document.createElement('canvas');
      c.width=d.w; c.height=d.h;
      const ctx=c.getContext('2d');
      ctx.fillStyle='white'; ctx.fillRect(0,0,d.w,d.h);
      const img=new Image();
      img.onload=()=>{ ctx.drawImage(img,0,0); };
      img.src=d.dataURL;
      const lbl=document.createElement('div');
      lbl.className='glabel'; lbl.textContent=char;
      card.appendChild(c); card.appendChild(lbl);
      // Click = lightbox
      card.onclick=()=>openLightbox(char);
      grid.appendChild(card);
    });
  }
  showScreen('gallery');
}

function openLightbox(char){
  const d=letterDrawings[char];
  if(!d)return;
  const lb=document.getElementById('lightbox');
  const lbc=document.getElementById('lbCanvas');
  // Scale to fit screen nicely
  const maxW=Math.min(window.innerWidth*0.88, 520);
  const maxH=window.innerHeight*0.72;
  const asp=d.h/d.w;
  let w=maxW, h=w*asp;
  if(h>maxH){h=maxH; w=h/asp;}
  lbc.width=Math.round(w); lbc.height=Math.round(h);
  const ctx=lbc.getContext('2d');
  ctx.fillStyle='white'; ctx.fillRect(0,0,lbc.width,lbc.height);
  const img=new Image();
  img.onload=()=>ctx.drawImage(img,0,0,lbc.width,lbc.height);
  img.src=d.dataURL;
  lb.classList.add('show');
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
}

window.addEventListener('resize', ()=>{
  fwC.width=window.innerWidth; fwC.height=window.innerHeight;
  if(document.getElementById('practice').classList.contains('out')) return;

  if(strokesDrawn.length>0) drX.putImageData(strokesDrawn[strokesDrawn.length-1],0,0);
});
